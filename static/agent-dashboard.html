<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dashboard — Odysseus</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='12' r='5' fill='%23A8E10C'/><path d='M8 28 Q16 20 24 28' fill='none' stroke='%23A8E10C' stroke-width='2.5' stroke-linecap='round'/></svg>" />
  <style>
    /* ── Agent Dashboard Specific Styles ── */
    .agent-dashboard {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
      color: var(--fg, #F9EBDC);
    }

    .agent-dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border, #FAAFCC);
    }

    .agent-dashboard-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--fg, #F9EBDC);
    }

    .agent-dashboard-header h1 svg {
      width: 32px;
      height: 32px;
      color: var(--red, #A8E10C);
    }

    .agent-count-badge {
      background: var(--panel, #235E36);
      color: var(--red, #A8E10C);
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border, #FAAFCC);
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .agent-card {
      background: var(--panel, #235E36);
      border: 1px solid var(--border, #FAAFCC);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .agent-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .agent-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .agent-avatar-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      flex-shrink: 0;
      background: var(--bg, #1A1A1A);
      border: 2px solid var(--border, #FAAFCC);
      color: var(--red, #A8E10C);
    }

    .agent-avatar.--chiron { border-color: #A8E10C; color: #A8E10C; }
    .agent-avatar.--fabio { border-color: #FAAFCC; color: #FAAFCC; }
    .agent-avatar.--hermes { border-color: #9cdef2; color: #9cdef2; }

    .agent-name-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .agent-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--fg, #F9EBDC);
      margin: 0;
    }

    .agent-role {
      font-size: 12px;
      color: var(--border, #FAAFCC);
      opacity: 0.8;
    }

    .agent-status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg, #1A1A1A);
      border: 1px solid var(--border, #FAAFCC);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.online {
      background: #A8E10C;
      box-shadow: 0 0 6px rgba(168, 225, 12, 0.5);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #e06c75;
    }

    .status-dot.busy {
      background: #f5c842;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .agent-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .agent-stat {
      background: var(--bg, #1A1A1A);
      border: 1px solid var(--border, #FAAFCC);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .agent-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--border, #FAAFCC);
      opacity: 0.7;
    }

    .agent-stat-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--fg, #F9EBDC);
      font-family: var(--font-family, 'Fira Code', monospace);
    }

    .agent-stat-value.accent {
      color: var(--red, #A8E10C);
    }

    .agent-recent-actions {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border, #FAAFCC);
      opacity: 0.6;
    }

    .agent-recent-actions-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--border, #FAAFCC);
      margin-bottom: 8px;
    }

    .agent-action-item {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(250, 175, 204, 0.15);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .agent-action-item:last-child {
      border-bottom: none;
    }

    .agent-action-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .agent-action-time {
      margin-left: auto;
      font-size: 11px;
      color: var(--border, #FAAFCC);
      opacity: 0.6;
      font-family: var(--font-family, 'Fira Code', monospace);
    }

    /* ── Add Agent Button ── */
    .add-agent-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      border: 2px dashed var(--border, #FAAFCC);
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      gap: 12px;
    }

    .add-agent-card:hover {
      background: rgba(35, 94, 54, 0.3);
      border-style: solid;
    }

    .add-agent-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border, #FAAFCC);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--red, #A8E10C);
      transition: all 0.2s ease;
    }

    .add-agent-card:hover .add-agent-icon {
      background: var(--red, #A8E10C);
      color: var(--bg, #1A1A1A);
      border-color: var(--red, #A8E10C);
    }

    .add-agent-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg, #F9EBDC);
    }

    .add-agent-hint {
      font-size: 12px;
      color: var(--border, #FAAFCC);
      opacity: 0.6;
    }

    /* ── Modal ── */
    .agent-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.85);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .agent-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .agent-modal {
      background: var(--panel, #235E36);
      border: 1px solid var(--border, #FAAFCC);
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .agent-modal-overlay.open .agent-modal {
      transform: scale(1);
    }

    .agent-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .agent-modal-header h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      color: var(--fg, #F9EBDC);
    }

    .agent-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border, #FAAFCC);
      background: var(--bg, #1A1A1A);
      color: var(--fg, #F9EBDC);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .agent-modal-close:hover {
      background: var(--red, #A8E10C);
      color: var(--bg, #1A1A1A);
      border-color: var(--red, #A8E10C);
    }

    .agent-form-group {
      margin-bottom: 20px;
    }

    .agent-form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--fg, #F9EBDC);
    }

    .agent-form-group input,
    .agent-form-group select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border, #FAAFCC);
      background: var(--bg, #1A1A1A);
      color: var(--fg, #F9EBDC);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s ease;
    }

    .agent-form-group input:focus,
    .agent-form-group select:focus {
      border-color: var(--red, #A8E10C);
    }

    .agent-form-group input::placeholder {
      color: var(--border, #FAAFCC);
      opacity: 0.5;
    }

    .agent-form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .agent-modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .agent-btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
      font-family: inherit;
    }

    .agent-btn-secondary {
      background: var(--bg, #1A1A1A);
      color: var(--fg, #F9EBDC);
      border-color: var(--border, #FAAFCC);
    }

    .agent-btn-secondary:hover {
      background: rgba(250, 175, 204, 0.1);
    }

    .agent-btn-primary {
      background: var(--red, #A8E10C);
      color: var(--bg, #1A1A1A);
      border-color: var(--red, #A8E10C);
    }

    .agent-btn-primary:hover {
      filter: brightness(1.1);
    }

    /* ── Activity Graph (mini) ── */
    .agent-activity-mini {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 32px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(250, 175, 204, 0.2);
    }

    .activity-bar {
      flex: 1;
      border-radius: 2px;
      background: var(--red, #A8E10C);
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }

    .activity-bar:hover {
      opacity: 0.8;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .agent-grid {
        grid-template-columns: 1fr;
      }
      .agent-dashboard-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }
      .agent-form-row {
        grid-template-columns: 1fr;
      }
    }

    /* ── Fade-in animation ── */
    .agent-card {
      animation: card-in 0.3s ease-out both;
    }

    .agent-card:nth-child(1) { animation-delay: 0.05s; }
    .agent-card:nth-child(2) { animation-delay: 0.1s; }
    .agent-card:nth-child(3) { animation-delay: 0.15s; }
    .agent-card:nth-child(4) { animation-delay: 0.2s; }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="agent-dashboard">
    <header class="agent-dashboard-header">
      <h1>
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="16" cy="12" r="5"/>
          <path d="M8 28 Q16 20 24 28"/>
          <path d="M12 16 L12 22"/>
          <path d="M20 16 L20 22"/>
        </svg>
        Agent Dashboard
      </h1>
      <span class="agent-count-badge" id="agent-count">3 agents</span>
    </header>

    <div class="agent-grid" id="agent-grid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <!-- Add Agent Modal -->
  <div class="agent-modal-overlay" id="add-agent-modal">
    <div class="agent-modal">
      <div class="agent-modal-header">
        <h2>Add New Agent</h2>
        <button class="agent-modal-close" id="modal-close" aria-label="Close modal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="add-agent-form">
        <div class="agent-form-group">
          <label for="agent-name">Agent Name</label>
          <input type="text" id="agent-name" placeholder="e.g. Athena" required />
        </div>

        <div class="agent-form-row">
          <div class="agent-form-group">
            <label for="agent-model">Model</label>
            <select id="agent-model" required>
              <option value="">Select model…</option>
              <option value="gpt-4o">GPT-4o</option>
              <option value="gpt-4o-mini">GPT-4o Mini</option>
              <option value="claude-sonnet-4">Claude 4 Sonnet</option>
              <option value="claude-opus-4">Claude 4 Opus</option>
              <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
              <option value="kimi-k2.6">Kimi K2.6</option>
              <option value="ollama-local">Ollama (local)</option>
            </select>
          </div>
          <div class="agent-form-group">
            <label for="agent-role">Role</label>
            <select id="agent-role" required>
              <option value="">Select role…</option>
              <option value="assistant">General Assistant</option>
              <option value="specialist">Domain Specialist</option>
              <option value="coder">Code Agent</option>
              <option value="creative">Creative Agent</option>
              <option value="research">Research Agent</option>
            </select>
          </div>
        </div>

        <div class="agent-form-group">
          <label for="agent-system-prompt">System Prompt (optional)</label>
          <input type="text" id="agent-system-prompt" placeholder="You are a helpful assistant…" />
        </div>

        <div class="agent-modal-actions">
          <button type="button" class="agent-btn agent-btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="agent-btn agent-btn-primary">Create Agent</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/agent-dashboard.js"></script>
</body>
</html>
