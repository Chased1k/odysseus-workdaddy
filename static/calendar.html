<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agent Calendar — Work Daddy</title>
  <link rel="icon" type="image/png" href="/static/images/fabio-avatar.png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/static/images/fabio-avatar.png">
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="stylesheet" href="/static/css/workdaddy-nav.css" />
  <style nonce="{{CSP_NONCE}}">
    :root {
      --bg: #1A1A1A;
      --fg: #F9EBDC;
      --panel: #235E36;
      --border: #FAAFCC;
      --accent: #A8E10C;
      --chiron: #A8E10C;
      --fabio: #FAAFCC;
      --hermes: #B2EAEA;
      --font-family: 'Fira Code', monospace;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-family);
    }

    /* Layout */
    .cal-container {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
      max-width: 1400px; margin: 0 auto;
      padding: 12px 16px;
    }

    /* Top bar */
    .cal-top {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
      margin-bottom: 12px;
    }
    .cal-top h1 {
      margin: 0; font-size: 1.25rem; font-weight: 600;
      color: var(--fg);
    }
    .cal-top .subtitle {
      font-size: 0.75rem; color: color-mix(in srgb, var(--fg) 60%, transparent);
      margin-top: 2px;
    }
    .cal-nav-group { display: flex; align-items: center; gap: 6px; }
    .cal-btn {
      background: var(--panel); color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px;
      font-family: inherit; font-size: 0.85rem; cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }
    .cal-btn:hover { background: color-mix(in srgb, var(--panel) 80%, var(--accent)); }
    .cal-btn.primary { background: var(--accent); color: #1A1A1A; border-color: var(--accent); font-weight: 600; }
    .cal-btn.primary:hover { background: color-mix(in srgb, var(--accent) 85%, white); }
    .cal-btn.active { box-shadow: inset 0 0 0 1.5px var(--accent); }

    /* Legend */
    .cal-legend {
      display: flex; gap: 16px; align-items: center;
      margin-bottom: 10px; flex-shrink: 0;
    }
    .cal-legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: color-mix(in srgb, var(--fg) 70%, transparent);
      cursor: pointer; user-select: none;
    }
    .cal-legend-item.hidden { opacity: 0.35; text-decoration: line-through; }
    .cal-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* Calendar grid */
    .cal-grid-wrap {
      flex: 1 1 auto;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: color-mix(in srgb, var(--bg) 96%, var(--panel));
    }

    /* Month view */
    .cal-month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      min-width: 680px;
    }
    .cal-month-header {
      display: contents;
    }
    .cal-month-header .cal-day-label {
      text-align: center; padding: 8px 4px;
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.06em;
      color: color-mix(in srgb, var(--fg) 55%, transparent);
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 30%, transparent);
      position: sticky; top: 0; z-index: 2;
    }
    .cal-month-cell {
      min-height: 110px;
      border-right: 1px solid color-mix(in srgb, var(--border) 35%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 35%, transparent);
      padding: 6px;
      display: flex; flex-direction: column; gap: 4px;
      transition: background 80ms;
    }
    .cal-month-cell:last-child { border-right: none; }
    .cal-month-cell:hover { background: color-mix(in srgb, var(--panel) 15%, transparent); }
    .cal-month-cell.outside { background: color-mix(in srgb, var(--bg) 80%, #000); opacity: 0.5; }
    .cal-month-cell.today { background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .cal-month-cell.today .cal-day-num { color: var(--accent); font-weight: 700; }
    .cal-day-num {
      font-size: 0.78rem; align-self: flex-end;
      color: color-mix(in srgb, var(--fg) 70%, transparent);
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }

    /* Week view */
    .cal-week-grid {
      display: grid;
      grid-template-columns: 56px repeat(7, 1fr);
      min-width: 800px;
    }
    .cal-week-header {
      display: contents;
    }
    .cal-week-header .cal-day-label {
      text-align: center; padding: 8px 4px;
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.06em;
      color: color-mix(in srgb, var(--fg) 55%, transparent);
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 30%, transparent);
      position: sticky; top: 0; z-index: 2;
    }
    .cal-week-header .cal-time-gutter {
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 30%, transparent);
      position: sticky; top: 0; z-index: 2;
    }
    .cal-week-row {
      display: contents;
    }
    .cal-time-gutter {
      text-align: right; padding: 4px 8px 0 0;
      font-size: 0.65rem;
      color: color-mix(in srgb, var(--fg) 45%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--border) 35%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 20%, transparent);
    }
    .cal-week-cell {
      min-height: 52px;
      border-right: 1px solid color-mix(in srgb, var(--border) 20%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--border) 20%, transparent);
      padding: 4px; position: relative;
    }
    .cal-week-cell:hover { background: color-mix(in srgb, var(--panel) 12%, transparent); }
    .cal-week-cell.today { background: color-mix(in srgb, var(--accent) 6%, transparent); }

    /* Day view */
    .cal-day-grid {
      display: grid;
      grid-template-columns: 56px 1fr;
      min-width: 400px;
    }
    .cal-day-row {
      display: contents;
    }

    /* Events */
    .cal-event {
      font-size: 0.72rem;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      border-left: 3px solid transparent;
      transition: transform 80ms, box-shadow 80ms;
      line-height: 1.35;
    }
    .cal-event:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .cal-event.chiron {
      background: color-mix(in srgb, var(--chiron) 18%, transparent);
      color: var(--chiron);
      border-left-color: var(--chiron);
    }
    .cal-event.fabio {
      background: color-mix(in srgb, var(--fabio) 18%, transparent);
      color: var(--fabio);
      border-left-color: var(--fabio);
    }
    .cal-event.hermes {
      background: color-mix(in srgb, var(--hermes) 18%, transparent);
      color: var(--hermes);
      border-left-color: var(--hermes);
    }
    .cal-event.all-day {
      border-radius: 3px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Week/day event positioning */
    .cal-week-cell .cal-event, .cal-day-grid .cal-event {
      position: absolute; left: 2px; right: 2px;
      font-size: 0.68rem; padding: 2px 5px;
    }

    /* Modal */
    .cal-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 160ms;
    }
    .cal-modal-overlay.open { opacity: 1; pointer-events: auto; }
    .cal-modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: min(520px, 92vw);
      max-height: 85vh; overflow: auto;
      padding: 20px 22px;
      transform: translateY(12px) scale(0.98);
      transition: transform 180ms cubic-bezier(0.22,0.61,0.36,1);
    }
    .cal-modal-overlay.open .cal-modal {
      transform: translateY(0) scale(1);
    }
    .cal-modal h3 { margin: 0 0 12px; font-size: 1.05rem; color: var(--fg); }
    .cal-modal .field {
      margin-bottom: 12px;
    }
    .cal-modal label {
      display: block; font-size: 0.72rem;
      color: color-mix(in srgb, var(--fg) 60%, transparent);
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .cal-modal input, .cal-modal select, .cal-modal textarea {
      width: 100%;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      font-family: inherit; font-size: 0.85rem;
    }
    .cal-modal textarea { min-height: 80px; resize: vertical; }
    .cal-modal .row { display: flex; gap: 10px; }
    .cal-modal .row .field { flex: 1; }
    .cal-modal .actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 6px;
    }
    .cal-detail-row {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 6px; font-size: 0.82rem;
    }
    .cal-detail-row .label {
      color: color-mix(in srgb, var(--fg) 50%, transparent);
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em;
      min-width: 80px; flex-shrink: 0;
    }
    .cal-detail-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    }
    .cal-detail-badge.chiron { background: color-mix(in srgb, var(--chiron) 22%, transparent); color: var(--chiron); }
    .cal-detail-badge.fabio { background: color-mix(in srgb, var(--fabio) 22%, transparent); color: var(--fabio); }
    .cal-detail-badge.hermes { background: color-mix(in srgb, var(--hermes) 22%, transparent); color: var(--hermes); }

    /* Scrollbar */
    .cal-grid-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
    .cal-grid-wrap::-webkit-scrollbar-track { background: var(--panel); }
    .cal-grid-wrap::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 4px; }

    /* Responsive */
    @media (max-width: 640px) {
      .cal-top { flex-wrap: wrap; gap: 8px; }
      .cal-top h1 { font-size: 1.05rem; }
      .cal-legend { flex-wrap: wrap; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="cal-container">
    <div class="cal-top">
      <div>
        <h1>Agent Calendar</h1>
        <div class="subtitle" id="calSubtitle">Work Daddy — Agent Schedule Overview</div>
      </div>
      <div class="cal-nav-group">
        <button class="cal-btn" id="calPrev">← Prev</button>
        <button class="cal-btn" id="calToday">Today</button>
        <button class="cal-btn" id="calNext">Next →</button>
        <button class="cal-btn" id="viewMonth">Month</button>
        <button class="cal-btn" id="viewWeek">Week</button>
        <button class="cal-btn" id="viewDay">Day</button>
        <button class="cal-btn primary" id="btnAddTask">+ Task</button>
      </div>
    </div>

    <div class="cal-legend" id="calLegend">
      <div class="cal-legend-item" data-agent="chiron">
        <div class="cal-dot" style="background:var(--chiron)"></div> Chiron
      </div>
      <div class="cal-legend-item" data-agent="fabio">
        <div class="cal-dot" style="background:var(--fabio)"></div> Fabio
      </div>
      <div class="cal-legend-item" data-agent="hermes">
        <div class="cal-dot" style="background:var(--hermes)"></div> Hermes
      </div>
    </div>

    <div class="cal-grid-wrap" id="calGridWrap">
      <div id="calGrid"></div>
    </div>
  </div>

  <!-- Event detail / add modal -->
  <div class="cal-modal-overlay" id="calModalOverlay">
    <div class="cal-modal" id="calModal">
      <h3 id="modalTitle">Event Details</h3>
      <div id="modalBody"></div>
      <div class="actions" id="modalActions"></div>
    </div>
  </div>

  <script type="module" src="/static/js/workdaddy-nav.js"></script>
  <script type="module" src="/static/js/calendar-agent.js"></script>
</body>
</html>
