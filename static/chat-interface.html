<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram — Work Daddy</title>
  <link rel="icon" type="image/png" href="/static/images/fabio-avatar.png">
  <meta name="theme-color" content="#1A1A1A">
  <!-- Odysseus core stylesheet -->
  <link rel="stylesheet" href="/static/style.css" />
  <!-- Page-specific overrides for Work Daddy Telegram theme -->
  <style>
    :root {
      --bg: #1A1A1A;
      --fg: #F9EBDC;
      --panel: #235E36;
      --border: #FAAFCC;
      --red: #A8E10C;
      --accent: #A8E10C;
      --brand-color: #A8E10C;
      --sidebar-bg: #235E36;
      --user-bubble-bg: color-mix(in srgb, #A8E10C 12%, #1A1A1A);
      --ai-bubble-bg: #235E36;
      --bubble-border: #FAAFCC;
      --input-bg: #1A1A1A;
      --input-border: #FAAFCC;
      --send-btn-bg: #A8E10C;
      --send-btn-hover: color-mix(in srgb, #A8E10C 80%, #fff);
    }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { background: var(--bg); color: var(--fg); font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }

    /* ===== Layout ===== */
    .tg-layout {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ===== Thread Sidebar ===== */
    .tg-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tg-sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .tg-sidebar-title {
      font-size: 15px; font-weight: 700; color: var(--fg); flex: 1;
    }
    .tg-search {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .tg-search input {
      width: 100%; padding: 6px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg); color: var(--fg);
      font-size: 13px; outline: none;
    }
    .tg-search input::placeholder { color: color-mix(in srgb, var(--fg) 45%, transparent); }
    .tg-thread-list {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 4px 6px;
    }
    .tg-thread {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 8px; border-radius: 8px; cursor: pointer;
      transition: background 0.12s;
    }
    .tg-thread:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .tg-thread.active { background: color-mix(in srgb, var(--accent) 18%, transparent); }
    .tg-thread-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: color-mix(in srgb, var(--fg) 14%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--fg);
      overflow: hidden;
    }
    .tg-thread-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .tg-thread-body { flex: 1; min-width: 0; }
    .tg-thread-top {
      display: flex; justify-content: space-between; align-items: baseline; gap: 6px;
    }
    .tg-thread-name {
      font-size: 13px; font-weight: 600; color: var(--fg);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .tg-thread-time {
      font-size: 11px; color: color-mix(in srgb, var(--fg) 55%, transparent); flex-shrink: 0;
    }
    .tg-thread-bottom {
      display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-top: 2px;
    }
    .tg-thread-preview {
      font-size: 12px; color: color-mix(in srgb, var(--fg) 60%, transparent);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .tg-thread-badge {
      min-width: 16px; height: 16px; padding: 0 5px; border-radius: 8px;
      background: var(--accent); color: var(--bg); font-size: 10px; font-weight: 700;
      line-height: 16px; text-align: center; flex-shrink: 0;
    }
    .tg-thread-type {
      font-size: 10px; color: color-mix(in srgb, var(--fg) 45%, transparent);
      margin-left: 4px; flex-shrink: 0;
    }

    /* ===== Chat Area ===== */
    .tg-chat {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
      background: var(--bg);
    }
    .tg-chat-header {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .tg-chat-header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: color-mix(in srgb, var(--fg) 14%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--fg); flex-shrink: 0;
    }
    .tg-chat-header-info { flex: 1; min-width: 0; }
    .tg-chat-header-name { font-size: 14px; font-weight: 700; color: var(--fg); }
    .tg-chat-header-sub { font-size: 11px; color: color-mix(in srgb, var(--fg) 55%, transparent); margin-top: 1px; }

    .tg-chat-history {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;
    }
    .tg-msg {
      max-width: 75%; min-width: 60px;
      padding: 8px 11px; border-radius: 14px;
      font-size: 13.5px; line-height: 1.45;
      word-wrap: break-word; overflow-wrap: break-word;
      position: relative;
    }
    .tg-msg-in {
      align-self: flex-start;
      background: var(--ai-bubble-bg);
      border: 1px solid var(--bubble-border);
      border-radius: 14px 14px 14px 4px;
      color: var(--fg);
    }
    .tg-msg-out {
      align-self: flex-end;
      background: var(--user-bubble-bg);
      border: 1px solid var(--bubble-border);
      border-radius: 14px 14px 4px 14px;
      color: var(--fg);
    }
    .tg-msg-sender {
      font-size: 11px; font-weight: 700; color: var(--accent);
      margin-bottom: 3px;
    }
    .tg-msg-text { white-space: pre-wrap; }
    .tg-msg-meta {
      display: flex; justify-content: flex-end; align-items: center; gap: 4px;
      margin-top: 4px; font-size: 10px;
      color: color-mix(in srgb, var(--fg) 50%, transparent);
    }
    .tg-msg-status svg { width: 12px; height: 12px; }

    .tg-chat-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: color-mix(in srgb, var(--fg) 35%, transparent);
      font-size: 14px; gap: 8px;
    }

    /* ===== Composer ===== */
    .tg-composer {
      padding: 10px 14px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .tg-composer-inner {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 16px;
      padding: 8px 10px;
    }
    .tg-composer textarea {
      flex: 1; background: transparent; border: none; outline: none; resize: none;
      font-size: 14px; line-height: 1.45; color: var(--fg); min-height: 22px; max-height: 160px;
      font-family: inherit;
    }
    .tg-composer textarea::placeholder { color: color-mix(in srgb, var(--fg) 35%, transparent); }
    .tg-send-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--send-btn-bg); color: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s; flex-shrink: 0;
    }
    .tg-send-btn:hover { background: var(--send-btn-hover); }
    .tg-send-btn:active { transform: scale(0.96); }
    .tg-send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .tg-send-btn svg { width: 16px; height: 16px; }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .tg-sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform .25s ease; }
      .tg-sidebar.open { transform: translateX(0); }
      .tg-sidebar-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 99;
        display: none;
      }
      .tg-sidebar-backdrop.show { display: block; }
      .tg-chat-header { padding-left: 44px; }
      .tg-mobile-menu-btn {
        position: fixed; top: 10px; left: 10px; z-index: 101;
        width: 32px; height: 32px; border: none; background: var(--panel);
        color: var(--fg); border-radius: 8px; display: flex; align-items: center; justify-content: center;
        cursor: pointer;
      }
    }
    @media (min-width: 769px) {
      .tg-mobile-menu-btn { display: none !important; }
      .tg-sidebar-backdrop { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="tg-layout" id="tg-layout">
    <button class="tg-mobile-menu-btn" id="tg-menu-btn" aria-label="Toggle threads">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="tg-sidebar-backdrop" id="tg-sidebar-backdrop"></div>

    <!-- Thread Sidebar -->
    <aside class="tg-sidebar" id="tg-sidebar" role="navigation" aria-label="Telegram threads">
      <div class="tg-sidebar-header">
        <span class="tg-sidebar-title">Telegram</span>
      </div>
      <div class="tg-search">
        <input type="text" id="tg-search" placeholder="Search chats…" autocomplete="off" />
      </div>
      <div class="tg-thread-list" id="tg-thread-list" role="list"></div>
    </aside>

    <!-- Chat Area -->
    <main class="tg-chat" id="tg-chat" aria-label="Conversation">
      <div class="tg-chat-header" id="tg-chat-header" style="display:none;">
        <div class="tg-chat-header-avatar" id="tg-header-avatar"></div>
        <div class="tg-chat-header-info">
          <div class="tg-chat-header-name" id="tg-header-name"></div>
          <div class="tg-chat-header-sub" id="tg-header-sub"></div>
        </div>
      </div>

      <div class="tg-chat-empty" id="tg-chat-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Select a chat to view messages</span>
      </div>

      <div class="tg-chat-history" id="tg-chat-history" role="log" aria-live="polite" style="display:none;"></div>

      <div class="tg-composer" id="tg-composer" style="display:none;">
        <div class="tg-composer-inner">
          <textarea id="tg-message-input" rows="1" placeholder="Message…" aria-label="Message input"></textarea>
          <button class="tg-send-btn" id="tg-send-btn" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/static/js/chat-telegram.js"></script>
</body>
</html>
